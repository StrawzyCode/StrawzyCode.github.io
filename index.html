<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Footydex Home</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Add the logo in the top right corner -->
    <div class="header">
        <a href="index.html" class="logo">Footydex</a>
    </div>

    <div class="cntr">
        <div class="cntr-innr">
            <label class="search" for="inpt_search">
                <input id="inpt_search" type="text" />
            </label>
            <p>Hover to input postcode.</p>
        </div>
    </div>

    <script>
        document.getElementById("inpt_search").addEventListener('focus', function() {
            this.parentNode.classList.add('active');
        });

        document.getElementById("inpt_search").addEventListener('blur', function() {
            if(this.value.length === 0) {
                this.parentNode.classList.remove('active');
            }
        });
    </script>
</body>
</html>
